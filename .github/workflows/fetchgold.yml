name: ShitCapital XAUVND Tracker

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9,12,15,18 * * *"
      timezone: "Asia/Ho_Chi_Minh"
  push:
    branches:
      - main

jobs:
    fetch:
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
        - name: Checkout main source code
          uses: actions/checkout@v6
          with:
            ref: data
            persist-credentials: true

        - name: "Set up Python"
          uses: actions/setup-python@v6
          with:
            python-version: "3.12"

        - name: Install dependencies
          run: pip install aiohttp aiofiles orjson beautifulsoup4

        - name: Configure secrets
          env:
            RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
            WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
            PROXY: ${{ vars.PROXY }}
          run: |
            echo "RAPIDAPI_KEY = \"$RAPIDAPI_KEY\"" >> credentials.py
            echo "WEBHOOK_URL = \"$WEBHOOK_URL\"" >> credentials.py
            echo "PROXY = \"$PROXY\"" >> credentials.py

        - name: Fetch data
          run: |
            python3 -c "print('\n\n'.join([''.join(c['source']) for c in __import__('orjson').loads(r'''$(curl https://raw.githubusercontent.com/SpikeVN/golddb/refs/heads/main/fetch.ipynb)''')['cells'][:-1] + [{'cell_type': 'code', 'source': ['__import__(\'asyncio\').run(run_cron())']}] if c['cell_type'] == 'code']))" > main.py
            python3 ./main.py

        - name: Remove credentials
          run: |
            rm credentials.py
            rm main.py
            
        - name: Sync data
          uses: stefanzweifel/git-auto-commit-action@v7
          with:
            branch: data
            commit_message: updates Vũ status on the centralized database
            commit_user_name: Thanh Do Phung
            commit_user_email: phungthanhdo@shitcapital.com.vn
            commit_author: Thanh Do Phung <phungthanhdo@shitcapital.com.vn>
